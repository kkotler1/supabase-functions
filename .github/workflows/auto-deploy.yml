name: Auto Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Detect changed functions and deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- functions/)
          if [ -z "$CHANGED" ]; then
            echo "No function files changed. Skipping deployment."
            exit 0
          fi
          FUNCTIONS=$(echo "$CHANGED" | cut -d'/' -f2 | sort -u)
          echo "Functions to deploy:"
          echo "$FUNCTIONS"
          for FUNC in $FUNCTIONS; do
            if [ -d "functions/$FUNC" ]; then
              echo "Deploying $FUNC..."

              # Read verify_jwt from config.toml (default: enabled)
              JWT_FLAG=""
              if grep -A5 "\[functions\.$FUNC\]" config.toml | grep -q "verify_jwt = false"; then
                JWT_FLAG="--no-verify-jwt"
              fi

              # Use explicit paths since functions live in functions/ not supabase/functions/
              IMPORT_MAP_FLAG=""
              if [ -f "functions/$FUNC/deno.json" ]; then
                IMPORT_MAP_FLAG="--import-map functions/$FUNC/deno.json"
              fi

              supabase functions deploy "$FUNC" \
                $JWT_FLAG \
                $IMPORT_MAP_FLAG \
                --entrypoint-path "functions/$FUNC/index.ts" \
                --project-ref "$SUPABASE_PROJECT_REF"

              echo "Deployed $FUNC successfully."
            else
              echo "Skipping $FUNC - directory not found."
            fi
          done
